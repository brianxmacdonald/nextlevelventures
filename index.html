<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --black: #050505;
    --card-bg: #0D0D0D;
    --red: #E8323A;
    --white: #F5F5F0;
    --muted: #888;
  }

  html, body {
    min-height: 100vh;
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px 60px;
  }

  /* HEADER */
  header {
    width: 100%;
    max-width: 900px;
    padding: 40px 0 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .nlv-logo {
    width: 222px;
    height: auto;
    opacity: 0.95;
    animation: fadeDown 0.7s ease both;
  }

  /* THESIS */
  .thesis-block {
    margin-top: 52px;
    text-align: center;
    max-width: 720px;
    animation: fadeUp 0.7s 0.15s ease both;
  }

  .thesis-headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 7vw, 74px);
    line-height: 0.95;
    letter-spacing: 0.02em;
    color: var(--white);
    margin-bottom: 18px;
  }

  .thesis-headline em {
    font-style: normal;
    color: var(--gold-light);
  }

  .thesis-sub {
    font-size: 16px;
    font-weight: 300;
    color: #aaa;
    line-height: 1.6;
    max-width: 500px;
    margin: 0 auto;
  }

  .thesis-sub u {
    text-decoration-color: var(--gold);
    text-underline-offset: 3px;
  }

  /* DIVIDER */
  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 36px auto;
    animation: fadeUp 0.7s 0.25s ease both;
  }

  /* CARDS */
  .cards {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    animation: fadeUp 0.7s 0.35s ease both;
  }

  .card {
    position: relative;
    background: var(--card-bg);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 36px 36px 40px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    border: 1px solid rgba(201, 168, 76, 0.12);
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.3);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--card-accent, var(--gold)), transparent);
    opacity: 0.8;
    transition: opacity 0.3s;
  }
  .card:hover::before { opacity: 1; }

  .card-automate { --card-accent: #9FE3F0; }

  /* EYEBROW */
  .card-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-automate .card-eyebrow { color: var(--card-accent); }
  .card-eyebrow::before {
    content: '';
    display: inline-block;
    width: 20px;
    height: 1px;
    background: currentColor;
  }

  /* LOGO */
  .card-logo-img {
    width: 222px;
    height: auto;
    margin-bottom: 20px;
    object-fit: contain;
    object-position: left;
  }

  /* TEXT LOGO (placeholder until real logo art) */
  .card-logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--white);
    margin-bottom: 20px;
  }

  /* VERB / NOUN */
  .card-verb {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 7vw, 80px);
    line-height: 0.9;
    letter-spacing: 0.03em;
    color: var(--white);
    margin-bottom: 4px;
  }

  .card-noun {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(16px, 2.2vw, 22px);
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 24px;
  }
  .card-automate .card-noun { color: var(--card-accent); }

  /* PAIN */
  .card-pain {
    font-family: 'Barlow', sans-serif;
    font-size: clamp(17px, 2.2vw, 17px);
    font-weight: 300;
    font-style: italic;
    color: #999;
    line-height: 1.4;
    margin-bottom: 16px;
  }

  /* PROOF */
  .card-proof {
    font-size: 13px;
    font-weight: 400;
    color: #666;
    line-height: 1.5;
    flex: 1;
    margin-bottom: 32px;
  }
  .card-proof strong {
    color: #aaa;
    font-weight: 600;
  }

  /* CTA */
  .card-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--black);
    background: var(--gold);
    padding: 13px 24px;
    border-radius: 2px;
    transition: gap 0.2s;
    align-self: flex-start;
  }
  .card-automate .card-cta { background: var(--card-accent); color: var(--black); }
  .card:hover .card-cta { gap: 14px; }
  .card-cta svg {
    width: 12px; height: 12px;
    transition: transform 0.2s;
  }
  .card:hover .card-cta svg { transform: translateX(3px); }

  /* FOOTER */
  footer {
    margin-top: 64px;
    text-align: center;
    animation: fadeUp 0.7s 0.5s ease both;
  }

  .footer-links {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 12px;
  }

  .footer-links a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-links a:hover { color: var(--gold); }

  .footer-copy {
    font-size: 11px;
    color: #444;
    letter-spacing: 0.05em;
  }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* MOBILE */
  @media (max-width: 640px) {
    .cards { grid-template-columns: 1fr; }
    .thesis-headline { font-size: 48px; }
    .card { padding: 28px 24px 32px; }
  }
</style>
